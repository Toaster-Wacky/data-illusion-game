<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMAND CENTER: LIVE LEADERBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap');
        
        body { background-color: #050a0f; color: #fff; font-family: 'Chakra Petch', sans-serif; padding: 40px; margin: 0; position: relative;}
        h1 { color: #00f3ff; text-align: center; font-size: 3rem; text-transform: uppercase; border-bottom: 3px solid #00f3ff; padding-bottom: 20px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(0,243,255,0.4); }
        
        /* ปุ่มรีเซ็ตสำหรับครู */
        #reset-btn { position: absolute; top: 40px; right: 40px; background: #ff003c; color: #fff; border: 2px solid #ff003c; padding: 12px 25px; font-family: 'Chakra Petch', sans-serif; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,60,0.4); transition: 0.2s;}
        #reset-btn:hover { background: #000; color: #ff003c; }

        #leaderboard { display: grid; gap: 25px; }
        .team-row { background: #111827; border: 2px solid #374151; border-radius: 12px; padding: 25px; display: flex; align-items: center; gap: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); transition: 0.3s; }
        
        .team-name { font-size: 2rem; font-weight: 700; color: #9ca3af; width: 150px; }
        .progress-wrapper { flex: 1; background: #000; height: 50px; border-radius: 25px; border: 2px solid #1f2937; overflow: hidden; position: relative; }
        
        /* แก้ปัญหาแถบไม่วิ่ง โดยบังคับ width ไว้ที่ 0% เป็นค่าเริ่มต้น */
        .progress-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.8s; }
        
        .status-badge { position: absolute; top: 50%; left: 25px; transform: translateY(-50%); font-size: 1.2rem; font-weight: 700; color: #fff; text-shadow: 1px 1px 4px #000; }
        
        /* สเตตัสสีตามด่าน - บังคับ width ใหม่ให้วิ่งไปตามสเตจ */
        .progress-fill.stage-1 { width: 14%; background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-fill.stage-2 { width: 28%; background: linear-gradient(90deg, #f59e0b, #f97316); }
        .progress-fill.stage-3 { width: 42%; background: linear-gradient(90deg, #3b82f6, #00f3ff); }
        .progress-fill.stage-4 { width: 57%; background: linear-gradient(90deg, #8b5cf6, #d946ef); }
        .progress-fill.stage-5 { width: 71%; background: linear-gradient(90deg, #ec4899, #ff007a); }
        .progress-fill.stage-6 { width: 85%; background: linear-gradient(90deg, #a855f7, #ff00ff); }
        .progress-fill.stage-7 { width: 100%; background: linear-gradient(90deg, #10b981, #00ff66); box-shadow: 0 0 20px #00ff66; }
        
        .active { border-color: #00f3ff; }
        .active .team-name { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
    </style>
</head>
<body>

    <h1>🌐 LIVE MISSION TRACKER</h1>
    <button id="reset-btn" onclick="resetBoard()">RESET SYSTEM</button>

    <div id="leaderboard">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ⚠️ Firebase Config 
        const firebaseConfig = {
            apiKey: "AIzaSyBMjigx-M5xZJPBaRqTNO_B3ZNDxpQ3rm0",
            authDomain: "statics-compound.firebaseapp.com",
            databaseURL: "https://statics-compound-default-rtdb.firebaseio.com", 
            projectId: "statics-compound",
            storageBucket: "statics-compound.firebasestorage.app",
            messagingSenderId: "1063084261081",
            appId: "1:1063084261081:web:71709a836015da876248c8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const board = document.getElementById('leaderboard');
        const teamNames = ["GROUP 1", "GROUP 2", "GROUP 3", "GROUP 4", "GROUP 5", "GROUP 6"];
        
        teamNames.forEach((name, index) => {
            const id = `team${index+1}`;
            board.innerHTML += `
                <div class="team-row" id="row-${id}">
                    <div class="team-name">${name}</div>
                    <div class="progress-wrapper">
                        <div class="progress-fill" id="fill-${id}"></div>
                        <div class="status-badge" id="badge-${id}">OFFLINE</div>
                    </div>
                </div>
            `;
        });

        // ดึงข้อมูลแบบ Real-time
        const gameRef = ref(db, 'game_state/');
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(teamId => {
                    const stage = data[teamId].stage;
                    updateUI(teamId, stage);
                });
            } else {
                for(let i=1; i<=6; i++) {
                    clearUI(`team${i}`);
                }
            }
        });

        // ฟังก์ชันอัปเดตหลอดคะแนน
        function updateUI(teamId, stage) {
            const row = document.getElementById(`row-${teamId}`);
            const fill = document.getElementById(`fill-${teamId}`);
            const badge = document.getElementById(`badge-${teamId}`);
            
            if(!row) return;
            row.classList.add('active');
            fill.className = 'progress-fill'; // Reset classes
            
            // เพิ่ม class stage-X เพื่อกระตุ้นให้ CSS ปรับความกว้างหลอดพลัง
            switch(stage) {
                case 1: 
                    fill.classList.add('stage-1'); badge.innerText = "PHASE 1: ถอดรหัสฐานข้อมูล"; break;
                case 2: 
                    fill.classList.add('stage-2'); badge.innerText = "PHASE 2: สกัดข้อมูลกราฟแท่ง"; break;
                case 3: 
                    fill.classList.add('stage-3'); badge.innerText = "PHASE 3: ทดสอบตรรกะสถิติ"; break;
                case 4: 
                    fill.classList.add('stage-4'); badge.innerText = "PHASE 4: ความขัดแย้งเชิงเปอร์เซ็นต์"; break;
                case 5: 
                    fill.classList.add('stage-5'); badge.innerText = "PHASE 5: คำนวณร้อยละส่วนประกอบ"; break;
                case 6: 
                    fill.classList.add('stage-6'); badge.innerText = "PHASE 6: อ่านแผนภูมิงานวิจัย"; break;
                case 7: 
                    fill.classList.add('stage-7'); badge.innerText = "LESSON COMPLETE! 🎉"; break;
            }
        }

        // ฟังก์ชันรีเซ็ตหลอดคะแนน
        function clearUI(teamId) {
            const row = document.getElementById(`row-${teamId}`);
            const fill = document.getElementById(`fill-${teamId}`);
            const badge = document.getElementById(`badge-${teamId}`);
            
            if(!row) return;
            row.classList.remove('active');
            fill.className = 'progress-fill';
            badge.innerText = "OFFLINE";
        }

        window.resetBoard = function() {
            if(confirm("⚠️ คำเตือน: คุณต้องการรีเซ็ตกระดานคะแนนสำหรับสอนห้องใหม่ใช่หรือไม่? (ข้อมูลคะแนนเดิมจะถูกลบทั้งหมด)")) {
                set(ref(db, 'game_state/'), null).then(() => {
                    alert("✅ รีเซ็ตกระดานเรียบร้อยแล้ว พร้อมสำหรับห้องต่อไป!");
                });
            }
        };
    </script>
</body>
</html>
